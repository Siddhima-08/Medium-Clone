<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Write | Medium</title>

    <link rel="stylesheet" href="write.css">

</head>

<body>

    <nav>

        <div class="logo">

            <h1>Medium</h1>

            <span>Draft</span>

            <span id="saved-status">Saved</span>

        </div>

        <div class="nav-right">

            <button id="publish-btn" disabled>

                Publish

            </button>

            <span>⋯</span>

            <span>🔔</span>

            <div class="profile">

                S

            </div>

        </div>

    </nav>

    <div class="editor">

        <input

        id="title"

        class="title"

        type="text"

        placeholder="Title">

        <textarea

        id="story"

        class="story"

        placeholder="Tell your story..."></textarea>

    </div>

    <script src="write.js"></script>

</body>

</html>
